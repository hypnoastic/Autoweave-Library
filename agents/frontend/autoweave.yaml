name: frontend-agent
role: frontend
description: AutoWeave sample frontend agent focused on ui delivery.
allowed_workflow_stages:
- planning
- implementation
- integration
- review
default_memory_scopes:
- project
- workflow_run
- task
allowed_tool_groups:
- context
- artifacts
- workspace
- terminal
sandbox_profile: isolated-worktree
model_profile_hints:
- fast
- balanced
approval_policy: request-before-risky-action
human_interaction_policy: request-clarification-through-orchestrator
specialization: ui-delivery
primary_skills:
- ui_states
- accessibility_checks
artifact_contracts:
- artifact_type: frontend_notes
  visibility: upstream
  required_status: final
  required: false
route_priority: 100
