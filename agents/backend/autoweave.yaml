name: backend-agent
role: backend
description: AutoWeave sample backend agent focused on api and data contracts.
allowed_workflow_stages:
- planning
- implementation
- integration
- review
default_memory_scopes:
- project
- workflow_run
- task
allowed_tool_groups:
- context
- artifacts
- workspace
- terminal
sandbox_profile: isolated-worktree
model_profile_hints:
- balanced
approval_policy: request-before-risky-action
human_interaction_policy: request-clarification-through-orchestrator
specialization: api-and-data-contracts
primary_skills:
- api_contracts
- data_integrity
artifact_contracts:
- artifact_type: backend_notes
  visibility: upstream
  required_status: final
  required: false
route_priority: 100
