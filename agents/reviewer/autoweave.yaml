name: reviewer-agent
role: reviewer
description: AutoWeave sample reviewer agent focused on quality and release.
allowed_workflow_stages:
- planning
- implementation
- integration
- review
default_memory_scopes:
- project
- workflow_run
- task
allowed_tool_groups:
- context
- artifacts
- workspace
- approvals
sandbox_profile: isolated-worktree
model_profile_hints:
- balanced
approval_policy: request-before-risky-action
human_interaction_policy: request-clarification-through-orchestrator
specialization: quality-and-release
primary_skills:
- qa_validation
- release_readiness
artifact_contracts:
- artifact_type: reviewer_notes
  visibility: upstream
  required_status: final
  required: false
route_priority: 100
