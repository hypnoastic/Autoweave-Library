- planning
- implementation
- integration
- review
default_memory_scopes:
- project
- workflow_run
- task
allowed_tool_groups:
- context
- artifacts
- approvals
- workflow
sandbox_profile: isolated-worktree
model_profile_hints:
- planner
approval_policy: request-before-risky-action
human_interaction_policy: request-clarification-through-orchestrator
specialization: workflow-decomposition
primary_skills:
- workflow_decomposition
- stakeholder_alignment
artifact_contracts:
- artifact_type: manager_notes
  visibility: upstream
  required_status: final
  required: false
route_priority: 50
