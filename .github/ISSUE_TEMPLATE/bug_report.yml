name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: AutoWeave Version
      description: What version of the AutoWeave Library are you using?
      placeholder: e.g. 0.1.0 or main branch commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version, etc.
      placeholder: e.g. macOS 14.5, Python 3.11, Docker 24.0.5
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run 'autoweave run-workflow...'
        2. Provide input 'X'
        3. See error 'Y'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Output
      description: Paste any relevant logs, tracebacks, or output. Use code blocks (```) for formatting.
    validations:
      required: false
