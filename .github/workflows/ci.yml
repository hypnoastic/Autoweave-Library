name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          python-version: "3.10"
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Typecheck with Mypy
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          python-version: "3.10"
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
      - name: Install Playwright browsers
        run: uv run playwright install chromium
      - name: Run Pytest
        run: uv run pytest tests/ -v --cov=autoweave --cov-report=xml --cov-fail-under=80

  build-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          python-version: "3.10"
      - name: Build Package
        run: |
          uv pip install build
          python -m build
      - name: Smoke Test
        run: |
          uv venv smoke-env
          source smoke-env/bin/activate
          pip install dist/*.whl
          autoweave --help
