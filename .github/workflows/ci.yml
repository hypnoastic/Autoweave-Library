name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format-typecheck:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Lint & Format Check (Ruff)
        run: make lint

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Install Playwright browsers
        run: uv run playwright install chromium
      - name: Start Redis for Tests
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 6
      - name: Run Tests & Check Coverage
        run: make test:coverage
        env:
          REDIS_URL: "redis://localhost:6379/0"
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.10' # Only upload once
        with:
          name: coverage-report
          path: .coverage
          retention-days: 14

  package:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint-format-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Run Package Smoke Test
        run: make pack:check
      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: autoweave-wheel
          path: dist/*.whl
          retention-days: 14

  health-report:
    name: Project Health Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Generate Health Report
        run: |
          uv pip install --system -e ".[dev]"
          make health
      - name: Upload Health Report
        uses: actions/upload-artifact@v4
        with:
          name: project-health
          path: reports/health_report.*
          retention-days: 30
