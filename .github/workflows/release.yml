name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build Package
        run: |
          uv pip install build
          python -m build
      - name: Smoke Test
        run: |
          uv venv smoke-env
          source smoke-env/bin/activate
          pip install dist/*.whl
          autoweave --help
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
